services:
  postgres:
    image: postgres:16-alpine
    container_name: omnia-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: omnia
      POSTGRES_PASSWORD: omnia
      POSTGRES_DB: omnia_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
